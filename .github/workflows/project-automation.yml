name: Project Automation

on:
  issues:
    types: [opened, assigned, closed]
  pull_request:
    types: [opened, closed]

jobs:
  update-project-status:
    runs-on: ubuntu-latest

    steps:
      - name: Log event
        run: |
          echo "Evento: ${{ github.event_name }}"
          echo "Accion: ${{ github.event.action }}"
          echo "Issue/PR: ${{ github.event.issue.title || github.event.pull_request.title }}"
